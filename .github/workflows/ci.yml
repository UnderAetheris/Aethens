name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ scripts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: python -m pytest tests/ -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/
          retention-days: 7

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run coverage
        run: pytest --cov=src/aetheris --cov-report=json --cov-report=term-missing -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: coverage.json
          retention-days: 7

  repository-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run architecture integrity check
        run: python scripts/check_architecture_integrity.py --check

  trace-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run trace fixture smoke test
        run: |
          python -m pytest tests/test_trace_adapters.py tests/test_trace_replay.py -q

  changeset-rollback-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run changeset contract tests
        run: |
          python -m pytest \
            tests/test_changeset_model.py \
            tests/test_changeset_projection.py \
            tests/test_changeset_receipts.py \
            tests/test_changeset_authority.py -q
      - name: Validate inspection CLI
        run: |
          python scripts/inspect_changes.py \
            --changes tests/fixtures/changeset/changes.json \
            --receipts tests/fixtures/changeset/receipts.json \
            --validate-only
      - name: Run architecture integrity check
        run: python scripts/check_architecture_integrity.py --check

  reasoning-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run reasoning gate
        run: python scripts/run_reasoning_gate.py

  research-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run research gate
        run: python scripts/run_research_gate.py

  hierarchy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run hierarchy gate
        run: python scripts/run_hierarchy_gate.py

  unattended-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unattended gate
        run: python scripts/run_unattended_gate.py
